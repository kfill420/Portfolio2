name: Deploy to Oracle VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote tmp folder
        run: ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ secrets.REMOTE_TMP }}"

      - name: Upload build files
        run: scp -i ~/.ssh/id_rsa -r dist/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.REMOTE_TMP }}/

      - name: Move files to Nginx folder
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            sudo mkdir -p ${{ secrets.REMOTE_PATH }}
            sudo cp -r ${{ secrets.REMOTE_TMP }}/* ${{ secrets.REMOTE_PATH }}/
            sudo chown -R www-data:www-data ${{ secrets.REMOTE_PATH }}
            sudo systemctl reload nginx
            rm -rf ${{ secrets.REMOTE_TMP }}
          EOF
